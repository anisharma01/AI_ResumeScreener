apiVersion: v1
kind: Service
metadata:
  name: resume-screener-frontend-service
  labels:
    app: resume-screener
    component: frontend
spec:
  type: NodePort
  ports:
  - port: 3000
    targetPort: 3000
    nodePort: 30080  # Accessible directly at http://<minikube-ip>:30080
    protocol: TCP
    name: http
  selector:
    app: resume-screener
    component: frontend
