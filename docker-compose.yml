services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: resume-screener-backend
    ports:
      - "8000:8000"
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY}
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: resume-screener-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped
