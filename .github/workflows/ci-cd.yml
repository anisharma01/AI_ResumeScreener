name: TalentLens AI CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  # 1. Verify and compile Frontend React/Vite/Tailwind v4 application
  frontend-ci:
    name: Frontend CI (React & Tailwind v4)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'npm'
        cache-dependency-path: './frontend/package.json'

    - name: Install Node Dependencies
      run: npm ci || npm install

    - name: Verify Production Compilation
      run: npm run build

  # 2. Verify Backend FastAPI syntax and dependencies
  backend-ci:
    name: Backend CI (FastAPI)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'
        cache-dependency-path: './backend/requirements.txt'

    - name: Install Python Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install flake8

    - name: Lint and Syntax Quality Checks
      # Checks for syntax errors or undefined names
      run: flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

  # 3. Test building the Docker images to guarantee build integrity
  docker-ci:
    name: Docker Images Build Verification
    runs-on: ubuntu-latest
    needs: [frontend-ci, backend-ci]
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build Backend Docker Image (Dry Run)
      uses: docker/build-push-action@v5
      with:
        context: ./backend
        file: ./backend/Dockerfile
        push: false
        tags: resume-screener-backend:test
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Build Frontend Docker Image (Dry Run)
      uses: docker/build-push-action@v5
      with:
        context: ./frontend
        file: ./frontend/Dockerfile
        push: false
        tags: resume-screener-frontend:test
        cache-from: type=gha
        cache-to: type=gha,mode=max

  # 4. Check Kubernetes manifests syntax
  kubernetes-ci:
    name: Kubernetes Manifests Verification
    runs-on: ubuntu-latest
    needs: [docker-ci]
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Install Kubectl
      uses: azure/setup-kubectl@v3
      with:
        version: 'v1.28.0'

    - name: Validate Manifest File Syntax (Dry-Run Check)
      run: |
        # Performs a local dry-run parse validation to catch formatting and structure errors
        kubectl apply --dry-run=client -f k8s/configmap.yaml
        kubectl apply --dry-run=client -f k8s/backend-deployment.yaml
        kubectl apply --dry-run=client -f k8s/backend-service.yaml
        kubectl apply --dry-run=client -f k8s/frontend-deployment.yaml
        kubectl apply --dry-run=client -f k8s/frontend-service.yaml
